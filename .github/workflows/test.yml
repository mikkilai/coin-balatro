name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: |
          node --check logic.js
          node --check ui.js
      - name: Unit & invariant tests
        run: node --test tests/*.test.js
      - name: Balance assertions
        run: node sim/balance.js --runs 300 --assert
